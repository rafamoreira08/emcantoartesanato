<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rastrear pedido — Em Canto Artesanato" />
  <title>Rastrear Pedido | Em Canto Artesanato</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body { background: #F0F7FF; }
    .track-page { padding: 100px 0 80px; min-height: 100vh; }
    .track-page__header { text-align: center; margin-bottom: 2.5rem; }

    /* Busca */
    .track-search {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 560px;
      margin: 0 auto 2rem;
    }
    .track-search p { font-size: .9rem; color: var(--text-light); margin-bottom: 1.25rem; }
    .track-input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .75rem;
      align-items: end;
    }
    .track-input-row input {
      padding: .75rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--font-body);
      letter-spacing: .08em;
      text-transform: uppercase;
      outline: none;
      transition: border-color var(--transition);
    }
    .track-input-row input:focus { border-color: var(--blue-mid); }
    #trackError { color: #c0392b; font-size: .85rem; margin-top: .75rem; min-height: 1.2em; }

    /* Resultado */
    #trackResult { max-width: 640px; margin: 0 auto; display: none; }

    .order-header {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.25rem;
    }
    .order-header__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: .75rem;
    }
    .order-header__code {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--blue-dark);
    }
    .order-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .35rem .85rem;
      border-radius: 50px;
      font-size: .78rem;
      font-weight: 700;
    }
    .order-badge--pe  { background: #E8F5E9; color: #27ae60; }
    .order-badge--enc { background: #EBF5FF; color: var(--blue-mid); }

    .order-header__items { font-size: .85rem; color: var(--text-light); }
    .order-header__items li { margin-bottom: .2rem; }

    /* Rastreio dos Correios */
    .tracking-code-box {
      background: #EBF5FF;
      border-left: 3px solid var(--blue-mid);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-size: .88rem;
      color: var(--blue-dark);
      margin-top: .75rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .tracking-code-box strong { font-size: 1rem; letter-spacing: .06em; }

    /* Timeline */
    .order-timeline {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      box-shadow: var(--shadow-sm);
    }
    .order-timeline h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-step {
      display: flex;
      gap: 1.25rem;
      position: relative;
    }
    .tl-step:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 40px;
      bottom: -4px;
      width: 2px;
      background: var(--border);
    }
    .tl-step.done::before  { background: #27ae60; }
    .tl-step.current::before { background: linear-gradient(to bottom, var(--blue-mid), var(--border)); }

    .tl-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .9rem;
      margin-bottom: 1.5rem;
    }
    .tl-step.done    .tl-dot { background: #27ae60; color: #fff; }
    .tl-step.current .tl-dot { background: var(--blue-mid); color: #fff; box-shadow: 0 0 0 4px rgba(58,133,199,.2); }
    .tl-step.pending .tl-dot { background: var(--bg-soft); color: var(--border); border: 2px solid var(--border); }

    .tl-body { flex: 1; padding-bottom: 1.5rem; }
    .tl-label {
      font-weight: 700;
      font-size: .92rem;
      color: var(--blue-dark);
      margin-bottom: .15rem;
    }
    .tl-step.pending .tl-label { color: var(--text-light); }
    .tl-date { font-size: .78rem; color: var(--text-light); }
    .tl-note { font-size: .82rem; color: var(--text-light); margin-top: .2rem; font-style: italic; }

    @media (max-width: 600px) {
      .track-input-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <img src="images/logo.png" alt="Em Canto Artesanato" class="nav__logo-img" />
        <span class="nav__logo-text">Em Canto <span>Artesanato</span></span>
      </a>
      <button class="nav__toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__list" id="navList">
        <li><a href="index.html" class="nav__link">Início</a></li>
        <li><a href="index.html#catalogo" class="nav__link">Catálogo</a></li>
        <li><a href="index.html#contato" class="nav__link">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main class="track-page">
    <div class="container">

      <div class="track-page__header">
        <p class="section__eyebrow">Acompanhe seu pedido</p>
        <h1 class="section__title">Rastrear <em>Pedido</em></h1>
      </div>

      <!-- Busca -->
      <div class="track-search">
        <p>Digite o código do pedido que você recebeu ao finalizar a compra (ex: <strong>EC26-K3BN</strong>).</p>
        <div class="track-input-row">
          <input type="text" id="trackInput" placeholder="EC26-XXXX" maxlength="9"
                 autocomplete="off" autocapitalize="characters" />
          <button id="trackBtn" class="btn btn--primary">
            <i class="fas fa-search"></i> Buscar
          </button>
        </div>
        <p id="trackError"></p>
      </div>

      <!-- Resultado -->
      <div id="trackResult">

        <div class="order-header">
          <div class="order-header__top">
            <span class="order-header__code" id="resCode"></span>
            <span class="order-badge" id="resBadge"></span>
          </div>
          <ul class="order-header__items" id="resItems"></ul>
          <div id="resTrackingCode" style="display:none" class="tracking-code-box">
            <i class="fas fa-barcode"></i>
            <div>
              <div style="font-size:.78rem;color:var(--text-light)">Código de rastreio dos Correios</div>
              <strong id="resTrackingCodeVal"></strong>
            </div>
          </div>
        </div>

        <div class="order-timeline">
          <h3><i class="fas fa-map-marker-alt"></i> Linha do Tempo</h3>
          <div class="timeline" id="resTimeline"></div>
        </div>

      </div>

    </div>
  </main>

  <script type="module" src="js/rastrear.js"></script>
</body>
</html>
